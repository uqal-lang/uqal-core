name: Bug Report
description: Something is not working as expected in uqal-core.
title: "bug: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: uqal-core version
      placeholder: "e.g. 0.3.1"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Load module ...
        2. Run query ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / stack trace
      render: shell
